<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">

        <div class="logo">
            <img src="https://images.seeklogo.com/logo-png/50/1/shop-app-logo-png_seeklogo-502749.png" alt="image-logo">
            <h3>GenZShopp</h3>
        </div>

        <div class="email">
            <label>Email</label>
            <input type="email" placeholder="genzshopp@gmail.com" autocomplete="off">
        </div>

        <div class="password">
            <label>Password</label>
            <input type="password" placeholder="Password" autocomplete="new-password">
        </div>

        <div class="button">
            <button>Log in</button>
        </div>

        <div class="google">
            <img src="/Asset/Google.png" alt="image">
            <p>Continue with Google</p>
        </div>

        <p id="p">Register acccount?<a href="">Sign Up</a></p>


    </div>
</body>
</html>
