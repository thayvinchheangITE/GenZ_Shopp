<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="card">

            <div class="logo">
                <img src="https://images.seeklogo.com/logo-png/50/1/shop-app-logo-png_seeklogo-502749.png" alt="image-logo">
                <h3>GenZShopp</h3>
            </div>

            <div class="name">
                <div class="first-name">
                    <label>First Name</label>
                    <input type="text" placeholder="First name">
                </div>

                <div class="last-name">
                    <label>Last Name</label>
                    <input type="text" placeholder="Last name">
                </div>
            </div>

            <div class="email">
                <label>Email</label>
                <input type="email" placeholder="genzhopper@gmail.com" autocomplete="off" required>
            </div>

            <div class="email">
                <label>Password</label>
                <input type="password" placeholder="Password" autocomplete="new-password" required>
            </div>

            <button>Create Account</button>


            <div class="google">
                <img src="/Asset/Google.png" alt="image">
                <p>Continue with Google</p>
            </div>

            <p id="p">Already have an acccount?<a href="">Sign In</a></p>
        </div>
    </div>

    <script src="index.js"></script>
</body>
</html>
